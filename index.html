<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/utility.css">
    <link rel="stylesheet" href="css/style.css">
   <link rel="icon" type="image/png" href="img/icons8-spotify-48.png">
</head>

<body>
    
    <div class="container flex bg-black">
        
        <div class="left">
            <div class="home bg-grey rounded m1 p1">
                <div class="logo">
                    <img class="invert" src="img/logo.svg" alt="">
                    <img  class="cross invert"  width="13px" src="img/cross.svg" alt="">
                </div>
                <ul>
                    <li><img class="invert" src="img/home.svg" alt="Home">Home</li>
                    <li><img class="invert" src="img/search.svg" alt="search">Search</li>
                </ul>
            </div>
            
            <div class="heading bg-grey rounded">
                <div class="Library bg-grey round m1 p1">
                    <img class="playlist invert" src="img/playlist.svg" alt="playlist">
                    <h3>
                        Your library
                    </h3>
                    
                    
                    <div class="footer">
                        <div><a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a></div>
                        <div><a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                        <div><a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a>
                        </div>
                        <div><a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a></div>
                        <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a>
                        </div>
                        <div><a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a></div>
                    </div>
                    
                </div>
                <div class="songlist">
                    <ul>
                        
                    </ul>
                </div>
            </div>
        </div>
        <div class="right border bg-grey rounded p1">
            
            
            <div class="header">
                <div class="nav">

                    <div class="hamburgerContainer flex">

                        <img class="hamburger invert" src="img/hamburger.svg" alt="">
                        
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                            d="M15 6L9.70711 11.2929C9.37377 11.6262 9.20711 11.7929 9.20711 12C9.20711 12.2071 9.37377 12.3738 9.70711 12.7071L15 18"
                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        
                        
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                            d="M9 18L14.2929 12.7071C14.6262 12.3738 14.7929 12.2071 14.7929 12C14.7929 11.7929 14.6262 11.6262 14.2929 11.2929L9 6"
                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                        
                </div>
                
                <div class="buttons">
                    <button class="signbtn">Sign Up</button>
                    <button class="loginbtn">Log in</button>
                </div>
            </div>
            <div class="Spotify_Playlist">
                
                <h2 id="top">Spotify Playlist</h2>
                
                <div class="cardContainer">
        
          
        
    </div>

    
    

    
    
    
    <div class="playbar" id="playbar">
        
        <div class="volume volume-bar">
            <img src="img/volume.svg" alt="">
            <div class="range">
                <input type="range" name="volume">
            </div>
        </div>

        
        <div class="seekbar">
            <div class="circle"></div>
        </div>
        
        <div class="abovebar">
            <div class="playbar-songinfo">
                
            </div>
            
            <div class="songcontrol invert">
                <img id="previous" src="img/previous_song.svg" alt="previous song">
                <img id="play" src="img/playbutton.svg" alt="previous song">
                <img id="next" src="img/next_song.svg " alt="previous song">
            </div>
            
            <div class="duration">
                
            </div>
        </div>
    </div>
</div>
</div>

</div>
<script src="js/script.js"></script>
</body>

</html>
